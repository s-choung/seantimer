# XcodeGen spec — run `xcodegen` to (re)generate Seantimer.xcodeproj, then
# open it and ⌘R. Keeps the project file deterministic and reviewable.
name: Seantimer
options:
  bundleIdPrefix: com.sean
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OPTIMIZATION_LEVEL: "-O"      # release-lean; debug overrides to -Onone
    DEAD_CODE_STRIPPING: YES

targets:
  Seantimer:
    type: application
    platform: macOS
    sources:
      - path: Sources/Core
      - path: Sources/App
    settings:
      base:
        PRODUCT_NAME: Seantimer
        PRODUCT_BUNDLE_IDENTIFIER: com.sean.seantimer
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_APP_SANDBOX: NO                       # plan §7 / locked decision 5
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        MARKETING_VERSION: "1.0"
        COMBINE_HIDPI_IMAGES: YES

  SeantimerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CoreTests
    dependencies:
      - target: Seantimer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sean.seantimerTests
